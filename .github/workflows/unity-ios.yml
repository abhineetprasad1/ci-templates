# ============================================================
# Reusable Workflow: iOS-only build + TestFlight upload
# Usage: abhineetprasad1/ci-templates/.github/workflows/unity-ios.yml@main
# ============================================================
name: Unity iOS CI/CD

on:
  workflow_call:
    inputs:
      unity_version:
        required: true
        type: string
      project_path:
        required: false
        type: string
        default: "."
      ios_bundle_id:
        required: true
        type: string
      ios_team_id:
        required: true
        type: string
      ios_build_name:
        required: false
        type: string
        default: "iOS"
      match_type:
        required: false
        type: string
        default: "appstore"
      upload_to_testflight:
        required: false
        type: boolean
        default: true
    secrets:
      UNITY_LICENSE:
        required: true
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true
      ASC_KEY_ID:
        required: false
      ASC_ISSUER_ID:
        required: false
      ASC_KEY_CONTENT:
        required: false
      MATCH_PASSWORD:
        required: false
      MATCH_GIT_BASIC_AUTHORIZATION:
        required: false
      MATCH_REPOSITORY:
        required: false

jobs:
  ios:
    name: iOS IPA → TestFlight
    runs-on: [self-hosted, macOS]
    env:
      # Homebrew Ruby binaries take priority over system Ruby 2.6
      PATH: /opt/homebrew/opt/ruby/bin:/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      # Fastlane support files are checked out here (ci-templates repo root)
      FASTLANE_DIR: ${{ github.workspace }}/_ci/ci-support

    steps:
      # ── Cleanup workspace from previous runs ─────────────────
      - name: Clean workspace
        shell: bash
        run: |
          rm -rf "${{ github.workspace }}/build"
          rm -rf "${{ github.workspace }}/_ci"

      # ── Checkout game project ─────────────────────────────────
      - name: Checkout game project
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          fetch-depth: 0

      - name: Ensure git-lfs is initialised
        shell: bash
        run: |
          if ! command -v git-lfs &>/dev/null; then
            brew install git-lfs
          fi
          git lfs install
          git lfs pull

      # ── Checkout ci-templates (Fastlane support) ─────────────
      - name: Checkout ci-templates
        uses: actions/checkout@v4
        with:
          repository: abhineetprasad1/ci-templates
          path: _ci
          ref: main

      # ── Compute build metadata ────────────────────────────────
      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            TAG=$(git describe --tags --exact-match HEAD)
            VERSION="${TAG#v}"
          else
            VERSION="0.1.0"
          fi
          echo "build_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}  Build: ${BUILD_NUMBER}"

      # ── Unity iOS build ───────────────────────────────────────
      - name: Build iOS Xcode project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion:     ${{ inputs.unity_version }}
          projectPath:      ${{ inputs.project_path }}
          targetPlatform:   iOS
          buildName:        ${{ inputs.ios_build_name }}
          versioning:       Custom
          version:          ${{ steps.meta.outputs.build_version }}
          customParameters: "-appleDeveloperTeamID ${{ inputs.ios_team_id }}"
          skipActivation:   true

      # ── Fastlane ──────────────────────────────────────────────
      - name: Install Fastlane dependencies
        working-directory: ${{ env.FASTLANE_DIR }}
        shell: bash
        run: |
          RUBY_BIN="/opt/homebrew/opt/ruby/bin"

          # Install bundler version matching Gemfile.lock
          BUNDLER_VERSION=$(grep -A1 "BUNDLED WITH" Gemfile.lock | tail -1 | tr -d ' ')
          "${RUBY_BIN}/gem" install bundler:${BUNDLER_VERSION} --no-document

          "${RUBY_BIN}/bundle" install

      - name: Write ASC API key
        shell: bash
        run: |
          echo '${{ secrets.ASC_KEY_CONTENT }}' | base64 -D > /tmp/asc-key.p8

      - name: Archive, sign and upload to TestFlight
        if: ${{ inputs.upload_to_testflight }}
        working-directory: ${{ env.FASTLANE_DIR }}
        shell: bash
        env:
          MATCH_PASSWORD:                ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_REPOSITORY:              ${{ secrets.MATCH_REPOSITORY }}
          MATCH_TYPE:                    ${{ inputs.match_type }}
          IOS_BUNDLE_ID:                 ${{ inputs.ios_bundle_id }}
          IOS_TEAM_ID:                   ${{ inputs.ios_team_id }}
          ASC_KEY_ID:                    ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:                 ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH:                  /tmp/asc-key.p8
          XCODE_PROJECT_PATH:            ${{ github.workspace }}/build/iOS/${{ inputs.ios_build_name }}
          BUILD_NUMBER:                  ${{ steps.meta.outputs.build_number }}
          BUILD_VERSION:                 ${{ steps.meta.outputs.build_version }}
        run: /opt/homebrew/opt/ruby/bin/bundle exec fastlane ios upload

      # ── Upload IPA artifact ───────────────────────────────────
      - name: Upload IPA artifact
        if: ${{ inputs.upload_to_testflight }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.meta.outputs.build_number }}
          path: ${{ env.FASTLANE_DIR }}/build/*.ipa
          retention-days: 14
