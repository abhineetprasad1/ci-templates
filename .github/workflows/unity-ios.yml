# ============================================================
# Reusable Workflow: iOS-only build + TestFlight upload
# Usage: abhineetprasad1/ci-templates/.github/workflows/unity-ios.yml@main
# ============================================================
name: Unity iOS CI/CD

on:
  workflow_call:
    inputs:
      unity_version:
        required: true
        type: string
      project_path:
        required: false
        type: string
        default: "."
      ios_bundle_id:
        required: true
        type: string
      ios_team_id:
        required: true
        type: string
      ios_build_name:
        required: false
        type: string
        default: "iOS"
      match_type:
        required: false
        type: string
        default: "appstore"
      upload_to_testflight:
        required: false
        type: boolean
        default: true
    secrets:
      UNITY_LICENSE:
        required: true
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true
      ASC_KEY_ID:
        required: false
      ASC_ISSUER_ID:
        required: false
      ASC_KEY_CONTENT:
        required: false
      MATCH_PASSWORD:
        required: false
      MATCH_GIT_BASIC_AUTHORIZATION:
        required: false
      MATCH_REPOSITORY:
        required: false

jobs:
  ios:
    name: iOS IPA → TestFlight
    runs-on: [self-hosted, macOS]
    env:
      # Make Homebrew binaries available to all steps
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      # ── Compute build metadata ──────────────────────────────
      - uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          fetch-depth: 0        # needed for tag detection

      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            TAG=$(git describe --tags --exact-match HEAD)
            VERSION="${TAG#v}"
          else
            VERSION="0.1.0"
          fi
          echo "build_version=${VERSION}" >> "$GITHUB_OUTPUT"

      # ── Fastlane support files ───────────────────────────────
      - name: Checkout ci-templates (Fastlane support)
        uses: actions/checkout@v4
        with:
          repository: abhineetprasad1/ci-templates
          path: ci-support
          ref: main

      # ── Unity build ─────────────────────────────────────────
      - name: Build iOS Xcode project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion:       ${{ inputs.unity_version }}
          projectPath:        ${{ inputs.project_path }}
          targetPlatform:     iOS
          buildName:          ${{ inputs.ios_build_name }}
          versioning:         Custom
          version:            ${{ steps.meta.outputs.build_version }}
          customParameters:   "-appleDeveloperTeamID ${{ inputs.ios_team_id }}"
          skipActivation:     true

      # ── Fastlane ─────────────────────────────────────────────
      - name: Install Fastlane dependencies
        working-directory: ci-support
        run: |
          gem install bundler --no-document 2>/dev/null || true
          bundle install

      - name: Write ASC API key
        run: |
          echo '${{ secrets.ASC_KEY_CONTENT }}' | base64 -D > /tmp/asc-key.p8

      - name: Archive, sign and upload to TestFlight
        if: ${{ inputs.upload_to_testflight }}
        working-directory: ci-support
        env:
          MATCH_PASSWORD:                ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_REPOSITORY:              ${{ secrets.MATCH_REPOSITORY }}
          MATCH_TYPE:                    ${{ inputs.match_type }}
          IOS_BUNDLE_ID:                 ${{ inputs.ios_bundle_id }}
          IOS_TEAM_ID:                   ${{ inputs.ios_team_id }}
          ASC_KEY_ID:                    ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:                 ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH:                  /tmp/asc-key.p8
          XCODE_PROJECT_PATH:            ${{ github.workspace }}/build/iOS/${{ inputs.ios_build_name }}
          BUILD_NUMBER:                  ${{ steps.meta.outputs.build_number }}
          BUILD_VERSION:                 ${{ steps.meta.outputs.build_version }}
        run: bundle exec fastlane ios upload

      - name: Upload IPA artifact
        if: ${{ inputs.upload_to_testflight }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.meta.outputs.build_number }}
          path: ci-support/build/*.ipa
          retention-days: 14
